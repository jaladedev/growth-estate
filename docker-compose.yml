services:
  # Laravel PHP-FPM
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - laravel

  # Nginx webserver
  webserver:
    image: nginx:alpine
    container_name: nginx-server
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - laravel

  # Scheduler (artisan schedule:run)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    depends_on:
      - app
      - db
      - redis
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: growthpoles
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: database
    networks:
      - laravel

  # Queue worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      - app
      - db
      - redis
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: growthpoles
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      QUEUE_CONNECTION: database
      CACHE_DRIVER: redis
    networks:
      - laravel

  # Postgres database
  db:
    image: postgis/postgis:16-3.4
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: growthpoles
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: laravel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - laravel

  # Redis (cache, locks, rate limiting)
  redis:
    image: redis:7
    container_name: growth-estate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    networks:
      - laravel

  # MailHog
  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  pgdata:
