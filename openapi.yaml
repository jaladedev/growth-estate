          description: Invalid referral code

  /referrals/rewards/available:
    get:
      tags: [Referrals]
      summary: Get unclaimed referral rewards
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available rewards

  /referrals/rewards/{id}/claim:
    post:
      tags: [Referrals]
      summary: Claim a referral reward
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reward claimed
        "400":
          description: Already claimed
        "404":
          description: Reward not found

  ################################################################
  # SUPPORT
  ################################################################

  /support/chat:
    post:
      tags: [Support]
      summary: AI-powered support chat
      description: >
        Rate limited to 20 messages per 10 minutes.
        Automatically escalates financial/security keywords to ticket creation.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  minItems: 1
                  maxItems: 20
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
                        maxLength: 2000
      responses:
        "200":
          description: AI reply
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      reply:
                        type: string
                      escalate:
                        type: boolean
                      from_faq:
                        type: boolean
        "429":
          description: Rate limit exceeded
        "503":
          description: AI service unavailable

  /support/tickets:
    get:
      tags: [Support]
      summary: List own support tickets (paginated)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Ticket list
    post:
      tags: [Support]
      summary: Create a new support ticket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [subject, category, message]
              properties:
                subject:
                  type: string
                  maxLength: 150
                category:
                  type: string
                  enum: [account, payment, kyc, investment, withdrawal, other]
                message:
                  type: string
                  maxLength: 3000
                priority:
                  type: string
                  enum: [low, normal, high]
                  nullable: true
                attachment:
                  type: string
                  format: binary
                  nullable: true
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SupportTicket'

  /support/guest-tickets:
    post:
      tags: [Support]
      summary: Submit a support ticket as a guest (rate limited 5/10 min per IP)
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, email, subject, category, message]
              properties:
                name:
                  type: string
                  maxLength: 100
                email:
                  type: string
                  format: email
                subject:
                  type: string
                  maxLength: 150
                category:
                  type: string
                  enum: [account, payment, kyc, investment, withdrawal, other]
                message:
                  type: string
                  maxLength: 3000
                attachment:
                  type: string
                  format: binary
                  nullable: true
      responses:
        "201":
          description: Guest ticket submitted
        "429":
          description: Rate limit exceeded

  /support/tickets/{ticket}:
    get:
      tags: [Support]
      summary: Get a single support ticket with messages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ticketParam'
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SupportTicket'
        "404":
          description: Ticket not found

  /support/tickets/{ticket}/reply:
    post:
      tags: [Support]
      summary: Reply to a support ticket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ticketParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  maxLength: 3000
                attachment:
                  type: string
                  format: binary
                  nullable: true
      responses:
        "201":
          description: Reply sent
        "422":
          description: Ticket already resolved

  /support/tickets/{ticket}/close:
    patch:
      tags: [Support]
      summary: Close / resolve a support ticket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ticketParam'
      responses:
        "200":
          description: Ticket closed

  /support/faqs:
    get:
      tags: [Support]
      summary: Get FAQs grouped by category (cached 1 hour)
      security: []
      responses:
        "200":
          description: FAQs grouped by category

  ################################################################
  # ADMIN — LANDS
  ################################################################

  /admin/lands:
    get:
      tags: [Admin – Lands]
      summary: List all lands with pagination (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated land list
    post:
      tags: [Admin – Lands]
      summary: Create a new land with geometry and optional images
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, location, size, total_units, geometry, price_per_unit_kobo]
              properties:
                title:
                  type: string
                  maxLength: 200
                location:
                  type: string
                  maxLength: 200
                size:
                  type: number
                total_units:
                  type: integer
                description:
                  type: string
                  nullable: true
                geometry:
                  type: string
                  description: GeoJSON geometry object (Point or Polygon) — JSON-encoded
                price_per_unit_kobo:
                  type: integer
                  minimum: 1
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Land created
        "422":
          description: Validation error

  /admin/lands/{id}:
    post:
      tags: [Admin – Lands]
      summary: Update land details (POST used for multipart compatibility)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/landId'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                location:
                  type: string
                size:
                  type: number
                description:
                  type: string
                geometry:
                  type: string
                  description: GeoJSON geometry (JSON-encoded)
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: Land updated

  /admin/lands/{id}/price:
    patch:
      tags: [Admin – Lands]
      summary: Update land price (creates a new price history record)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/landId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price_per_unit_kobo]
              properties:
                price_per_unit_kobo:
                  type: integer
                  minimum: 1
                price_date:
                  type: string
                  format: date
                  nullable: true
      responses:
        "200":
          description: Price updated

  /admin/lands/{id}/availability:
    patch:
