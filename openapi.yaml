  ################################################################
  # WEBHOOKS (public — no JWT)
  ################################################################

  /paystack/webhook:
    post:
      tags: [Webhooks]
      summary: Paystack webhook (charge.success, transfer events)
      description: >
        Verifies the `x-paystack-signature` HMAC-SHA512 header before processing.
        Handles `charge.success` to credit deposits and logs transfer events.
      security: []
      parameters:
        - name: x-paystack-signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaystackWebhookPayload'
      responses:
        "200":
          description: Event handled
        "400":
          description: Missing signature
        "403":
          description: Invalid signature

  /monnify/webhook:
    post:
      tags: [Webhooks]
      summary: Monnify webhook (SUCCESSFUL_TRANSACTION)
      description: >
        Verifies the `monnify-signature` HMAC-SHA512 header.
        Credits the user wallet on successful transactions.
      security: []
      parameters:
        - name: monnify-signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonnifyWebhookPayload'
      responses:
        "200":
          description: Event handled
        "400":
          description: Missing or invalid signature

  /opay/webhook:
    post:
      tags: [Webhooks]
      summary: OPay webhook (payment SUCCESS)
      description: >
        Verifies the `Signature` HMAC-SHA512 header (body signed with OPAY_SECRET_KEY).
        Credits the user wallet on successful OPay payments.
        Idempotent — duplicate callbacks are safely ignored.
      security: []
      parameters:
        - name: Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA512 of the raw JSON body using OPAY_SECRET_KEY
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpayWebhookPayload'
      responses:
        "200":
          description: Event handled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "400":
          description: Missing signature or bad payload
        "403":
          description: Invalid signature
        "404":
          description: Deposit reference not found