openapi: 3.1.0
info:
  title: Growth Estate API
  version: 2.0.0
  description: >
    Enterprise-grade OpenAPI 3.1 specification for the Growth Estate / Sproutvest application.
    Covers authentication (JWT), email verification, password reset, KYC, lands, purchases,
    deposits (Paystack · Monnify · OPay), withdrawals, webhooks, bank resolution,
    notifications, transaction PIN, referrals, portfolio, support tickets, and admin routes.

servers:
  - url: https://growth-estate.onrender.com/api
    description: Production
  - url: http://127.0.0.1:8000/api
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Registration, login, token refresh, logout, password change
  - name: Email Verification
    description: Code-based email verification
  - name: Password Reset
    description: Code-based password reset
  - name: Profile
    description: Authenticated user profile and account status
  - name: KYC
    description: Know-Your-Customer submission and admin review
  - name: Lands
    description: Land listings (public and protected)
  - name: Purchase
    description: Buy and sell land units
  - name: Portfolio
    description: Portfolio summary, chart, performance and allocation
  - name: Deposits
    description: Deposit initiation and status
  - name: Withdrawals
    description: Withdrawal requests and status
  - name: Banks
    description: Bank list and account resolution (Paystack)
  - name: Notifications
    description: In-app notification endpoints
  - name: PIN
    description: Transaction PIN set, update and reset
  - name: Referrals
    description: Referral dashboard and reward claiming
  - name: Support
    description: AI chat, support tickets, and FAQs
  - name: Admin – Lands
    description: Admin land management
  - name: Admin – Users
    description: Admin user management
  - name: Admin – KYC
    description: Admin KYC review
  - name: Admin – Support
    description: Admin support ticket management
  - name: Admin – Referrals
    description: Admin referral overview
  - name: Webhooks
    description: Payment gateway webhook endpoints (public)

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    landId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Land identifier
    referenceParam:
      name: reference
      in: path
      required: true
      schema:
        type: string
      description: Transaction / withdrawal / deposit reference
    ticketParam:
      name: ticket
      in: path
      required: true
      schema:
        type: integer
      description: Support ticket ID
    notificationId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Notification UUID
    userId:
      name: user
      in: path
      required: true
      schema:
        type: integer
      description: User ID
    kycId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: KYC verification record ID

  schemas:

    # ── Generic ──────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          nullable: true

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    # ── Auth ─────────────────────────────────────────────────────────────────

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/User'

    # ── User ─────────────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:
          type: integer
        uid:
          type: string
          example: USR-AB12CD
        name:
          type: string
        email:
          type: string
          format: email
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        is_admin:
          type: boolean
        is_suspended:
          type: boolean
        balance_kobo:
          type: integer
          description: Main wallet balance in kobo
        rewards_balance_kobo:
          type: integer
        total_spendable_kobo:
          type: integer
        bank_name:
          type: string
          nullable: true
        bank_code:
          type: string
          nullable: true
        account_number:
          type: string
          nullable: true
        account_name:
          type: string
          nullable: true
        recipient_code:
          type: string
          nullable: true
        bank_verified:
          type: boolean
        referral_code:
          type: string
          nullable: true
        pin_is_set:
          type: boolean
        is_kyc_verified:
          type: boolean
        kyc_status:
          type: string
          enum: [none, not_submitted, pending, approved, rejected, resubmit]
        created_at:
          type: string
          format: date-time

    # ── KYC ──────────────────────────────────────────────────────────────────

    KycVerification:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        full_name:
          type: string
        date_of_birth:
          type: string
          format: date
        phone_number:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        id_type:
          type: string
          enum: [nin, drivers_license, voters_card, passport, bvn]
        id_number:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, resubmit]
        rejection_reason:
          type: string
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Land ─────────────────────────────────────────────────────────────────

    LandImage:
      type: object
      properties:
        id:
          type: integer
        land_id:
          type: integer
        image_url:
          type: string
          format: uri

    LandPrice:
      type: object
      properties:
        price_per_unit_kobo:
          type: integer
        price_date:
          type: string
          format: date

    Land:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        location:
          type: string
        size:
          type: number
        total_units:
          type: integer
        available_units:
          type: integer
        units_sold:
          type: integer
        sold_percentage:
          type: number
        is_available:
          type: boolean
        description:
          type: string
          nullable: true
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        map_color:
          type: string
          enum: [green, yellow, orange, red]
        current_price_per_unit_kobo:
          type: integer
        images:
          type: array
          items:
            $ref: '#/components/schemas/LandImage'
        latest_price:
          $ref: '#/components/schemas/LandPrice'
          nullable: true
        created_at:
          type: string
          format: date-time

    LandList:
      type: array
      items:
        $ref: '#/components/schemas/Land'

    # ── Purchases ────────────────────────────────────────────────────────────

    PurchaseRequest:
      type: object
      required: [units]
      properties:
        units:
          type: integer
          minimum: 1
        use_rewards:
          type: boolean
          default: true
          description: Apply rewards balance / discount at checkout

    SellRequest:
      type: object
      required: [units]
      properties:
        units:
          type: integer
          minimum: 1

    PurchaseResponse:
      type: object
      properties:
        message:
          type: string
        reference:
          type: string
        original_cost_kobo:
          type: integer
        discount_applied_kobo:
          type: integer
        discount_percent:
          type: number
        paid_from_rewards_kobo:
          type: integer
        paid_from_wallet_kobo:
          type: integer
        total_paid_kobo:
          type: integer
        remaining_units:
          type: integer

    SellResponse:
      type: object
      properties:
        message:
          type: string
        reference:
          type: string
        amount_received_kobo:
          type: integer
        amount_received_naira:
          type: number
        available_units:
          type: integer

    # ── Transactions ─────────────────────────────────────────────────────────

    Transaction:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        land_id:
          type: integer
        type:
          type: string
          enum: [purchase, sale]
        units:
          type: integer
        amount_kobo:
          type: integer
        status:
          type: string
        reference:
          type: string
        transaction_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    # ── Deposits ─────────────────────────────────────────────────────────────

    DepositInitRequest:
      type: object
      required: [amount, gateway]
      properties:
        amount:
          type: integer
          minimum: 100000
          maximum: 1000000000
          description: Amount in kobo (e.g. 100000 = ₦1,000)
        gateway:
          type: string
          enum: [paystack, monnify, opay]

    DepositInitResponse:
      type: object
      properties:
        payment_url:
          type: string
          format: uri
        reference:
          type: string
        gateway:
          type: string
          enum: [paystack, monnify, opay]
        transaction_fee:
          type: number
          description: Fee in Naira
        total_amount:
          type: number
          description: Total charged in Naira (principal + fee)

    Deposit:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        reference:
          type: string
        gateway:
          type: string
          enum: [paystack, monnify, opay]
        amount_kobo:
          type: integer
        transaction_fee:
          type: integer
        total_kobo:
          type: integer
        status:
          type: string
          enum: [pending, completed, failed]
        processed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Withdrawals ──────────────────────────────────────────────────────────

    WithdrawalRequest:
      type: object
      required: [amount, transaction_pin]
      properties:
        amount:
          type: integer
          minimum: 500000
          description: Amount in kobo (minimum ₦5,000)
        transaction_pin:
          type: string
          minLength: 4
          maxLength: 4

    Withdrawal:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        reference:
          type: string
        amount_kobo:
          type: integer
        status:
          type: string
          enum: [pending, processing, completed, failed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Banks ────────────────────────────────────────────────────────────────

    Bank:
      type: object
      properties:
        name:
          type: string
        code:
          type: string

    ResolveAccountRequest:
      type: object
      required: [account_number, bank_code]
      properties:
        account_number:
          type: string
          minLength: 10
          maxLength: 10
        bank_code:
          type: string

    ResolveAccountResponse:
      type: object
      properties:
        account_name:
          type: string
        account_number:
          type: string
        bank_id:
          type: integer
          nullable: true

    BankDetailsRequest:
      type: object
      required: [account_number, bank_code]
      properties:
        account_number:
          type: string
          minLength: 10
          maxLength: 10
        bank_code:
          type: string
          maxLength: 10
        bank_name:
          type: string
          nullable: true

    # ── Notifications ────────────────────────────────────────────────────────

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        data:
          type: object
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── PIN ──────────────────────────────────────────────────────────────────

    PinSetRequest:
      type: object
      required: [pin, pin_confirmation]
      properties:
        pin:
          type: string
          minLength: 4
          maxLength: 4
        pin_confirmation:
          type: string

    PinUpdateRequest:
      type: object
      required: [current_pin, new_pin, pin_confirmation]
      properties:
        current_pin:
          type: string
          minLength: 4
          maxLength: 4
        new_pin:
          type: string
          minLength: 4
          maxLength: 4
        pin_confirmation:
          type: string

    PinResetRequest:
      type: object
      required: [reset_token, new_pin, pin_confirmation]
      properties:
        reset_token:
          type: string
        new_pin:
          type: string
          minLength: 4
          maxLength: 4
        pin_confirmation:
          type: string

    # ── Portfolio ────────────────────────────────────────────────────────────

    PortfolioSummary:
      type: object
      properties:
        current_portfolio_value_kobo:
          type: integer
        current_portfolio_value_naira:
          type: number
        total_profit_loss_kobo:
          type: integer
        total_profit_loss_naira:
          type: number
        profit_loss_percent:
          type: number

    # ── Referrals ────────────────────────────────────────────────────────────

    Referral:
      type: object
      properties:
        id:
          type: integer
        referrer_id:
          type: integer
        referred_user_id:
          type: integer
        status:
          type: string
          enum: [pending, completed]
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ReferralReward:
      type: object
      properties:
        id:
          type: integer
        referral_id:
          type: integer
        user_id:
          type: integer
        reward_type:
          type: string
          enum: [cashback, discount, bonus_units]
        amount_kobo:
          type: integer
          nullable: true
        discount_percentage:
          type: number
          nullable: true
        claimed:
          type: boolean
        claimed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Support ──────────────────────────────────────────────────────────────

    SupportMessage:
      type: object
      properties:
        id:
          type: integer
        ticket_id:
          type: integer
        sender_type:
          type: string
          enum: [user, admin, guest]
        sender_id:
          type: integer
          nullable: true
        body:
          type: string
        attachment_path:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    SupportTicket:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
          nullable: true
        guest_name:
          type: string
          nullable: true
        guest_email:
          type: string
          nullable: true
        reference:
          type: string
          example: TKT-ABCD1234
        subject:
          type: string
        category:
          type: string
          enum: [account, payment, kyc, investment, withdrawal, other]
        status:
          type: string
          enum: [open, waiting, closed, resolved]
        priority:
          type: string
          enum: [low, normal, high]
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SupportMessage'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Webhooks ─────────────────────────────────────────────────────────────

    PaystackWebhookPayload:
      type: object
      properties:
        event:
          type: string
          example: charge.success
        data:
          type: object

    MonnifyWebhookPayload:
      type: object
      properties:
        eventType:
          type: string
          example: SUCCESSFUL_TRANSACTION
        eventData:
          type: object

    OpayWebhookPayload:
      type: object
      properties:
        type:
          type: string
          example: payment.success
        data:
          type: object
          properties:
            reference:
              type: string
            status:
              type: string
              enum: [SUCCESS, PENDING, FAIL]
            amount:
              type: number
              description: Amount in NGN

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  ################################################################
  # AUTH
  ################################################################

  /register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: Must include uppercase, lowercase, number, and special char
                password_confirmation:
                  type: string
                referral_code:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      tags: [Auth]
      summary: Login and receive JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Invalid credentials
        "403":
          description: Email not verified
        "404":
          description: User not found

  /me:
    get:
      tags: [Auth, Profile]
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        "401":
          description: Unauthenticated

  /refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /logout:
    post:
      tags: [Auth]
      summary: Invalidate JWT token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  /user/change-password:
    post:
      tags: [Auth]
      summary: Change password for authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password, new_password_confirmation]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
                new_password_confirmation:
                  type: string
      responses:
        "200":
          description: Password changed
        "400":
          description: Current password incorrect or same as new
        "422":
          description: Validation errors

  ################################################################
  # EMAIL VERIFICATION
  ################################################################

  /email/verify/code:
    post:
      tags: [Email Verification]
      summary: Verify email with 6-digit code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, verification_code]
              properties:
                email:
                  type: string
                  format: email
                verification_code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        "200":
          description: Email verified
        "400":
          description: Invalid or expired code
        "404":
          description: User not found

  /email/resend-verification:
    post:
      tags: [Email Verification]
      summary: Resend email verification code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Verification code resent
        "400":
          description: Email already verified
        "404":
          description: User not found

  ################################################################
  # PASSWORD RESET
  ################################################################

  /password/reset/code:
    post:
      tags: [Password Reset]
      summary: Send password reset code to email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset code sent (response is identical whether email exists or not)

  /password/reset/verify:
    post:
      tags: [Password Reset]
      summary: Verify password reset code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, reset_code]
              properties:
                email:
                  type: string
                  format: email
                reset_code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        "200":
          description: Code verified
        "400":
          description: Invalid or expired code

  /password/reset:
    post:
      tags: [Password Reset]
      summary: Reset password using verified code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, reset_code, password, password_confirmation]
              properties:
                email:
                  type: string
                  format: email
                reset_code:
                  type: string
                  minLength: 6
                  maxLength: 6
                password:
                  type: string
                  minLength: 8
                password_confirmation:
                  type: string
      responses:
        "200":
          description: Password reset successful
        "400":
          description: Invalid or expired code
        "422":
          description: Validation errors

  ################################################################
  # PROFILE
  ################################################################

  /user/account-status:
    get:
      tags: [Profile]
      summary: Get account status (PIN, KYC, blocking reasons)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      pin_is_set:
                        type: boolean
                      is_kyc_verified:
                        type: boolean
                      kyc_status:
                        type: string
                      can_transact:
                        type: boolean
                      blocking_reasons:
                        type: array
                        items:
                          type: string

  /user/bank-details:
    put:
      tags: [Profile, Banks]
      summary: Update bank details (resolves account via Paystack)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankDetailsRequest'
      responses:
        "200":
          description: Bank details updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  account_name:
                    type: string
        "422":
          description: Could not verify account

  /user/stats:
    get:
      tags: [Profile]
      summary: Get user statistics and portfolio overview
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      balance_kobo:
                        type: integer
                      total_invested_kobo:
                        type: integer
                      total_received_kobo:
                        type: integer
                      current_portfolio_value_kobo:
                        type: integer
                      current_portfolio_value_naira:
                        type: number
                      total_profit_loss_kobo:
                        type: integer
                      total_profit_loss_naira:
                        type: number
                      profit_loss_percent:
                        type: number
                      units_owned:
                        type: integer
                      lands_owned:
                        type: integer
                      total_withdrawn_kobo:
                        type: integer
                      pending_withdrawals:
                        type: integer
                      pin_is_set:
                        type: boolean
                      is_kyc_verified:
                        type: boolean
                      kyc_status:
                        type: string

  /user/lands:
    get:
      tags: [Profile]
      summary: Get all lands and units owned by authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User land holdings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        land_id:
                          type: integer
                        units:
                          type: integer
                        total_amount_paid_kobo:
                          type: integer
                        purchase_date:
                          type: string
                          format: date-time
                        land:
                          type: object
                          properties:
                            id:
                              type: integer
                            title:
                              type: string
                            location:
                              type: string
                            size:
                              type: number

  /transactions/user:
    get:
      tags: [Profile]
      summary: Get all transactions for authenticated user (deposits, withdrawals, land transactions)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        amount:
                          type: number
                        status:
                          type: string
                        date:
                          type: string
                          format: date-time

  ################################################################
  # KYC
  ################################################################

  /kyc/status:
    get:
      tags: [KYC]
      summary: Get own KYC status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [not_submitted, pending, approved, rejected, resubmit]
                      is_verified:
                        type: boolean
                      submission_date:
                        type: string
                        format: date-time
                        nullable: true
                      verified_at:
                        type: string
                        format: date-time
                        nullable: true
                      rejection_reason:
                        type: string
                        nullable: true

  /kyc/submit:
    post:
      tags: [KYC]
      summary: Submit KYC documents
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [full_name, date_of_birth, phone_number, address, city, state, id_type, id_number, id_front, selfie]
              properties:
                full_name:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                phone_number:
                  type: string
                address:
                  type: string
                city:
                  type: string
                state:
                  type: string
                country:
                  type: string
                id_type:
                  type: string
                  enum: [nin, drivers_license, voters_card, passport, bvn]
                id_number:
                  type: string
                id_front:
                  type: string
                  format: binary
                id_back:
                  type: string
                  format: binary
                  nullable: true
                selfie:
                  type: string
                  format: binary
      responses:
        "200":
          description: KYC submitted successfully
        "400":
          description: Already verified or pending

  /kyc/{id}/image/{imageType}:
    get:
      tags: [KYC]
      summary: Stream a KYC image (owner or admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/kycId'
        - name: imageType
          in: path
          required: true
          schema:
            type: string
            enum: [id_front, id_back, selfie]
      responses:
        "200":
          description: Image stream
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Record or file not found
        "429":
          description: Rate limit exceeded

  ################################################################
  # LANDS — PUBLIC & PROTECTED
  ################################################################

  /land:
    get:
      tags: [Lands]
      summary: Public listing of available lands (cached 5 min)
      security: []
      responses:
        "200":
          description: Public land list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LandList'

  /lands:
    get:
      tags: [Lands]
      summary: All lands — authenticated (cached 5 min)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Full land list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/LandList'

  /lands/map:
    get:
      tags: [Lands]
      summary: Bounding-box filtered land map data
      security:
        - bearerAuth: []
      parameters:
        - name: min_lng
          in: query
          required: true
          schema:
            type: number
        - name: min_lat
          in: query
          required: true
          schema:
            type: number
        - name: max_lng
          in: query
          required: true
          schema:
            type: number
        - name: max_lat
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Lands within bounding box
        "422":
          description: Invalid bounding box

  /lands/{id}:
    get:
      tags: [Lands]
      summary: Get a single land with price history
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/landId'
      responses:
        "200":
          description: Land detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Land'
        "404":
          description: Land not found

  /lands/{id}/units:
    get:
      tags: [Lands]
      summary: Get unit summary for a land
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/landId'
      responses:
        "200":
          description: Unit summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total_units:
                        type: integer
                      available_units:
                        type: integer
                      sold_units:
                        type: integer

  ################################################################
  # PURCHASE & SELL
  ################################################################

  /lands/{id}/purchase:
    post:
      tags: [Purchase]
      summary: Purchase units of a land
      description: Requires JWT, verified email, and transaction PIN middleware.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/landId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseRequest'
      responses:
        "200":
          description: Purchase successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseResponse'
        "400":
          description: Insufficient units or wallet balance
        "422":
          description: Validation error

  /lands/{id}/sell:
    post:
      tags: [Purchase]
      summary: Sell units of a land back
      description: Requires JWT, verified email, and transaction PIN middleware.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/landId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellRequest'
      responses:
        "200":
          description: Units sold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellResponse'
        "422":
          description: Not enough units to sell

  ################################################################
  # PORTFOLIO
  ################################################################

  /portfolio/summary:
    get:
      tags: [Portfolio]
      summary: Portfolio value, profit/loss and ROI
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/PortfolioSummary'

  /portfolio/chart:
    get:
      tags: [Portfolio]
      summary: Historical portfolio value snapshots
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            enum: [7, 14, 30, 90, 180, 365]
            default: 30
      responses:
        "200":
          description: Daily snapshots

  /portfolio/performance:
    get:
      tags: [Portfolio]
      summary: Annualised return and overall performance metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Performance data

  /portfolio/allocation:
    get:
      tags: [Portfolio]
      summary: Per-land portfolio allocation breakdown
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Allocation breakdown

  /portfolio/asset/{id}:
    get:
      tags: [Portfolio]
      summary: Detailed performance for a single land asset
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/landId'
      responses:
        "200":
          description: Asset detail
        "404":
          description: User does not own this land

  ################################################################
  # DEPOSITS
  ################################################################

  /deposit:
    post:
      tags: [Deposits]
      summary: Initiate a deposit — returns a payment URL
      description: Supports Paystack, Monnify, and OPay gateways.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositInitRequest'
      responses:
        "200":
          description: Deposit initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositInitResponse'
        "500":
          description: Could not create deposit record
        "502":
          description: Gateway error

  /deposit/{reference}:
    get:
      tags: [Deposits]
      summary: Check deposit status by reference
      description: For OPay deposits that are still pending, this actively polls the gateway.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/referenceParam'
      responses:
        "200":
          description: Deposit status
          content:
            application/json:
              schema:
                type: object
                properties:
                  reference:
                    type: string
                  gateway:
                    type: string
                  status:
                    type: string
                    enum: [pending, completed, failed]
                  amount:
                    type: number
        "404":
          description: Deposit not found

  ################################################################
  # WITHDRAWALS
  ################################################################

  /withdraw:
    post:
      tags: [Withdrawals]
      summary: Request a withdrawal
      description: >
        Validates transaction PIN inline (passed in the request body), checks KYC,
        enforces daily limit, debits balance, and initiates a Paystack transfer.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalRequest'
      responses:
        "200":
          description: Withdrawal initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  reference:
                    type: string
        "400":
          description: Missing bank details
        "403":
          description: KYC required
        "422":
          description: Insufficient balance, daily limit reached, or invalid PIN

  /withdrawals/{reference}:
    get:
      tags: [Withdrawals]
      summary: Get withdrawal status by reference
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/referenceParam'
      responses:
        "200":
          description: Withdrawal status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Withdrawal'
        "404":
          description: Not found

  /withdrawal/retry:
    get:
      tags: [Withdrawals]
      summary: Retry all pending withdrawals (admin / internal)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending withdrawals retried

  ################################################################
  # BANKS
  ################################################################

  /paystack/banks:
    get:
      tags: [Banks]
      summary: Get cached list of Nigerian banks from Paystack
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bank list
          content:
            application/json:
              schema:
                type: object
                properties:
                  banks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Bank'

  /paystack/resolve-account:
    post:
      tags: [Banks]
      summary: Resolve account number to account name
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveAccountRequest'
      responses:
        "200":
          description: Resolved account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveAccountResponse'
        "502":
          description: Could not resolve account

  ################################################################
  # TRANSACTION PIN
  ################################################################

  /pin/set:
    post:
      tags: [PIN]
      summary: Set transaction PIN for the first time
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinSetRequest'
      responses:
        "200":
          description: PIN set
        "422":
          description: PIN already set

  /pin/update:
    post:
      tags: [PIN]
      summary: Change existing transaction PIN
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinUpdateRequest'
      responses:
        "200":
          description: PIN updated
        "422":
          description: Current PIN incorrect

  /pin/forgot:
    post:
      tags: [PIN]
      summary: Send PIN reset code to authenticated user's email
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reset code sent

  /pin/verify-code:
    post:
      tags: [PIN]
      summary: Verify PIN reset code — returns a short-lived reset token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        "200":
          description: Code verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  reset_token:
                    type: string
                  message:
                    type: string
        "422":
          description: Invalid or expired code

  /pin/reset:
    post:
      tags: [PIN]
      summary: Reset transaction PIN using reset token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinResetRequest'
      responses:
        "200":
          description: PIN reset
        "422":
          description: Invalid or expired reset token

  ################################################################
  # NOTIFICATIONS
  ################################################################

  /notifications:
    get:
      tags: [Notifications]
      summary: Get all notifications (paginated)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  notifications:
                    type: object
                    description: Paginated result

  /notifications/unread:
    get:
      tags: [Notifications]
      summary: Get unread notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  unread_notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'

  /notifications/read:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read

  /notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark a single notification as read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/notificationId'
      responses:
        "200":
          description: Notification marked as read
        "404":
          description: Not found

  ################################################################
  # REFERRALS
  ################################################################

  /referrals/dashboard:
    get:
      tags: [Referrals]
      summary: Referral dashboard — code, link, stats, and reward history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Referral dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      referral_code:
                        type: string
                      referral_link:
                        type: string
                        format: uri
                      total_referrals:
                        type: integer
                      completed_referrals:
                        type: integer
                      pending_referrals:
                        type: integer
                      total_rewards_kobo:
                        type: integer
                      unclaimed_rewards_kobo:
                        type: integer
                      referrals:
                        type: array
                        items:
                          $ref: '#/components/schemas/Referral'
                      rewards:
                        type: array
                        items:
                          $ref: '#/components/schemas/ReferralReward'

  /referrals/validate:
    post:
      tags: [Referrals]
